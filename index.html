<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Haval</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/header.css">

<body>
  <!--  Header -->
  <header class="header">
    <div class="header__top">
      <div class="container header__top-inner">
        <div class="header__logo-wrapper">
          <a href="/" class="header__logo">
            <img src="assets/icons/logo.svg" alt="Haval logo">
          </a>

          <span class="header__divider" aria-hidden="true"></span>

          <a href="#" class="header__partner">
            <img src="assets/icons/logo-partner.svg" alt="Partner logo">
          </a>
        </div>

        <a href="tel:+74957559990" class="header__phone">
          <img src="assets/icons/mobile.svg" alt="">
          <span class="header__phone-text bold">+7 (495) 755 99 90</span>
        </a>

        <address class="header__address">
          <img src="assets/icons/pin.svg" alt="">
          <span class="header__address-text">
            МО, г. Химки, Ленинградское ш., вл.14 стр.1
            <span class="header__address-hours">Часы работы с 09:00 до 21:00</span>
          </span>
        </address>
      </div>
    </div>

    <nav class="header__nav">
      <div class="container header__nav-inner">
        <ul class="header__models">
          <li><a href="#" class="header__nav-link">M6</a></li>
          <li><a href="#" class="header__nav-link">DARGO X</a></li>
          <li><a href="#" class="header__nav-link">DARGO</a></li>
          <li><a href="#" class="header__nav-link">JOLION</a></li>
          <li><a href="#" class="header__nav-link">F7x</a></li>
          <li><a href="#" class="header__nav-link">F7</a></li>
          <li><a href="#" class="header__nav-link">H9</a></li>
          <li><a href="#" class="header__nav-link">GWM Poer</a></li>
          <li><a href="#" class="header__nav-link">GWM Poer KINGKONG</a></li>
        </ul>
        <ul class="header__actions">
          <li><a href="#" class="header__nav-link">Подобрать комплектацию</a></li>
          <li><a href="#" class="header__nav-link">Тест-драйв</a></li>
          <li><a href="#" class="header__nav-link">Контакты</a></li>
        </ul>
      </div>
    </nav>
  </header>

</html>
